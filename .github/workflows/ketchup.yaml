name: Ketchup

on:
  schedule:
  - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: pages-publish
  cancel-in-progress: false

jobs:
  ketchup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Configure git identity
      run: |
        git config user.name "ketchup-bot"
        git config user.email "ketchup-bot@users.noreply.github.com"

    - name: Write Claude credentials
      env:
        CLAUDE_CREDS: ${{ secrets.CLAUDE_CREDENTIALS }}
      run: |
        umask 077
        mkdir -p "$RUNNER_TEMP/claude"
        printf '%s' "$CLAUDE_CREDS" > "$RUNNER_TEMP/claude/.credentials.json"

    - name: Run ketchup
      env:
        GITHUB_TOKEN: ${{ secrets.KETCHUP_TOKEN }}
        CLAUDE_CONFIG_DIR: ${{ runner.temp }}/claude
      run: |
        creds="$RUNNER_TEMP/claude/.credentials.json"
        before=$(sha256sum "$creds" | cut -d' ' -f1)
        make ketchup
        after=$(sha256sum "$creds" | cut -d' ' -f1)
        if [[ $before != $after ]]; then
          report=$(ls -1 report/*.md | tail -1)
          tmp=$(mktemp)
          {
            echo '*Claude OAuth credentials rotated during this run.*'
            echo
            cat "$report"
          } > "$tmp"
          mv "$tmp" "$report"
          git add "$report"
          git commit --amend --no-edit
          git push --force-with-lease
        fi

  publish-www:
    needs: ketchup
    if: always() && needs.ketchup.result != 'cancelled'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0

    - name: Configure git identity
      run: |
        git config --global user.name "ketchup-bot"
        git config --global user.email "ketchup-bot@users.noreply.github.com"

    - name: Publish to gh-pages
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        make publish-www \
          REPO="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
